services:
  llama-server:
    image: ghcr.io/ggml-org/llama.cpp:server
    platform: linux/arm64
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models:ro
    command:
      - -m
      - /models/card-designer.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - -c
      - "512"
      - -t
      - "4"
      - -np
      - "1"
      - -b
      - "64"
      - -ub
      - "64"
    mem_limit: 384m
    cpus: 0.5
    restart: "no"
